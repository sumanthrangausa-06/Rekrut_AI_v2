<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — HireLoop</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/globals.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/"><h1>Hire<span style="color:#4f46e5;">Loop</span></h1></a>
        <p>Sign in to your account</p>
      </div>

      <!-- OAuth Buttons -->
      <div id="oauthSection" style="display:none;">
        <button onclick="loginWithGoogle()" class="btn btn-secondary btn-full mb-3" id="googleBtn" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button onclick="loginWithLinkedIn()" class="btn btn-secondary btn-full" id="linkedinBtn" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          Continue with LinkedIn
        </button>
        <div class="auth-divider">or</div>
      </div>

      <!-- Error Message -->
      <div id="errorMsg" style="display:none;background:#fef2f2;color:#dc2626;padding:0.75rem 1rem;border-radius:0.5rem;font-size:0.875rem;margin-bottom:1rem;"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="/js/core.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      Auth.check().then(ok => {
        if (ok) {
          window.location.href = Auth.isRecruiter() ? '/recruiter-dashboard.html' : '/candidate-dashboard.html';
        }
      });
    }

    // Check URL params for errors
    const urlParams = new URLSearchParams(window.location.search);
    const errorParam = urlParams.get('error');
    if (errorParam) showError(decodeURIComponent(errorParam));

    // Handle URL token params (from OAuth callback)
    const tokenParam = urlParams.get('token');
    const refreshParam = urlParams.get('refresh');
    if (tokenParam) {
      Auth.setTokens(tokenParam, refreshParam);
      Auth.check().then(ok => {
        if (ok) window.location.href = Auth.isRecruiter() ? '/recruiter-dashboard.html' : '/candidate-dashboard.html';
      });
    }

    // Check OAuth availability
    fetch('/api/auth/oauth/status').then(r => r.json()).then(data => {
      let hasOAuth = false;
      if (data.google?.configured) { document.getElementById('googleBtn').style.display = 'flex'; hasOAuth = true; }
      if (data.linkedin?.configured) { document.getElementById('linkedinBtn').style.display = 'flex'; hasOAuth = true; }
      if (hasOAuth) document.getElementById('oauthSection').style.display = 'block';
    }).catch(() => {});

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Signing in...';
      hideError();

      try {
        const data = await Auth.login(email, password);
        if (data.success) {
          window.location.href = Auth.isRecruiter() ? '/recruiter-dashboard.html' : '/candidate-dashboard.html';
        } else {
          showError(data.error || 'Login failed');
          resetBtn();
        }
      } catch (err) {
        showError(err.message || 'Login failed. Please try again.');
        resetBtn();
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    function resetBtn() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }

    async function loginWithGoogle() {
      try {
        const res = await fetch('/api/auth/google/url');
        const data = await res.json();
        if (data.url) window.location.href = data.url;
        else showError('Google login not available');
      } catch { showError('Google login failed'); }
    }

    async function loginWithLinkedIn() {
      try {
        const res = await fetch('/api/auth/linkedin/url');
        const data = await res.json();
        if (data.url) window.location.href = data.url;
        else showError('LinkedIn login not available');
      } catch { showError('LinkedIn login failed'); }
    }
  </script>
  <script defer src="https://polsia.com/analytics.js" data-slug="hireloop"></script>
</body>
</html>
