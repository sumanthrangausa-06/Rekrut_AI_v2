<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Practice & Coaching - HireLoop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <style>
    .practice-layout {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
    }

    .practice-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .practice-header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 3rem;
      margin-bottom: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }

    .practice-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .practice-header p {
      font-size: 1.25rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      padding: 1.5rem;
      color: white;
      text-align: center;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      display: block;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 0.875rem;
      opacity: 0.9;
    }

    .tabs-container {
      background: white;
      border-radius: 24px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #eee;
    }

    .tab {
      padding: 1rem 2rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      position: relative;
      transition: all 0.3s ease;
    }

    .tab:hover {
      color: #667eea;
    }

    .tab.active {
      color: #667eea;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .question-library {
      display: grid;
      gap: 1.5rem;
    }

    .question-card {
      background: white;
      border: 2px solid #eee;
      border-radius: 16px;
      padding: 2rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .question-card:hover {
      border-color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
    }

    .question-category-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .category-behavioral {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .category-technical {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .category-situational {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
    }

    .question-text {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }

    .question-meta {
      display: flex;
      gap: 1.5rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .practice-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .practice-modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 24px;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 3rem;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      color: var(--text-muted);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: #f5f5f5;
      color: var(--text-primary);
    }

    .modal-question {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      border-radius: 16px;
      margin-bottom: 2rem;
    }

    .modal-question h3 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .response-area {
      margin-bottom: 2rem;
    }

    .response-area label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--text-primary);
    }

    .response-area textarea {
      width: 100%;
      min-height: 200px;
      padding: 1rem;
      border: 2px solid #eee;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      transition: border-color 0.3s ease;
    }

    .response-area textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .coaching-result {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .coaching-result.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .score-display {
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 16px;
      margin-bottom: 2rem;
    }

    .score-value {
      font-size: 4rem;
      font-weight: 700;
    }

    .score-label {
      font-size: 1.25rem;
      opacity: 0.9;
    }

    .coaching-section {
      background: #f9fafb;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .coaching-section h4 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .coaching-list {
      list-style: none;
      padding: 0;
    }

    .coaching-list li {
      padding: 0.75rem 0;
      border-bottom: 1px solid #eee;
      color: var(--text-secondary);
    }

    .coaching-list li:last-child {
      border-bottom: none;
    }

    .improved-response {
      background: white;
      border: 2px solid #667eea;
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1rem;
      font-style: italic;
      color: var(--text-secondary);
    }

    .progress-chart {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .chart-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
    }

    .progress-bars {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .progress-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .progress-bar-container {
      height: 12px;
      background: #eee;
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 6px;
      transition: width 0.5s ease;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: white;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 2rem;
      padding: 0.75rem 1.5rem;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateX(-4px);
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="practice-layout">
    <div class="practice-container">
      <a href="/candidate-dashboard.html" class="back-link">
        ← Back to Dashboard
      </a>

      <!-- Header with Stats -->
      <div class="practice-header">
        <h1>🎯 Interview Coaching</h1>
        <p>Practice with AI-powered feedback and track your progress</p>

        <div class="stats-grid" id="stats-grid">
          <div class="stat-card">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Questions Practiced</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-avg">—</span>
            <span class="stat-label">Average Score</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-improvement">—</span>
            <span class="stat-label">Improvement</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-streak">0</span>
            <span class="stat-label">Day Streak</span>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs-container">
        <div class="tabs">
          <button class="tab active" data-tab="library">📚 Question Library</button>
          <button class="tab" data-tab="progress">📊 Progress Dashboard</button>
        </div>

        <!-- Question Library Tab -->
        <div class="tab-content active" id="library-content">
          <div class="question-library" id="question-library">
            <!-- Questions will be loaded here -->
          </div>
        </div>

        <!-- Progress Dashboard Tab -->
        <div class="tab-content" id="progress-content">
          <div class="progress-chart">
            <h3 class="chart-title">Performance by Category</h3>
            <div class="progress-bars" id="category-progress">
              <!-- Progress bars will be loaded here -->
            </div>
          </div>

          <div class="progress-chart">
            <h3 class="chart-title">Recent Practice Sessions</h3>
            <div id="recent-sessions">
              <!-- Recent sessions will be loaded here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Practice Modal -->
  <div class="practice-modal" id="practice-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closePracticeModal()">×</button>

      <div id="practice-question-view">
        <div class="modal-question">
          <h3 id="modal-question-text">Question will appear here</h3>
          <div style="margin-top: 1rem; opacity: 0.9;">
            <span id="modal-category-badge"></span>
          </div>
        </div>

        <div class="response-area">
          <label>Your Response</label>
          <textarea id="practice-response" placeholder="Take your time to craft a thoughtful response. Think about specific examples and use the STAR method (Situation, Task, Action, Result) for behavioral questions."></textarea>
        </div>

        <button class="btn btn-primary btn-large btn-full" onclick="submitPracticeResponse()">
          Get AI Coaching
        </button>
      </div>

      <div id="coaching-result" class="coaching-result">
        <!-- Coaching results will be shown here -->
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; padding: 2rem; border-radius: 16px; text-align: center;">
      <div class="spinner-large" style="width: 48px; height: 48px; border: 4px solid #eee; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;"></div>
      <p id="loading-text" style="color: var(--text-primary); font-weight: 600;">Loading...</p>
    </div>
  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script src="/js/main.js"></script>
  <script src="/js/interview-practice.js"></script>
</body>
</html>
