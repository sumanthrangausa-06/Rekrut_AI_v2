<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Practice & Coaching - HireLoop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <!-- TensorFlow.js for video analysis -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.js"></script>
  <style>
    .practice-layout {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
    }

    .practice-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .practice-header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 3rem;
      margin-bottom: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }

    .practice-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .practice-header p {
      font-size: 1.25rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      padding: 1.5rem;
      color: white;
      text-align: center;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      display: block;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 0.875rem;
      opacity: 0.9;
    }

    .tabs-container {
      background: white;
      border-radius: 24px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #eee;
    }

    .tab {
      padding: 1rem 2rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      position: relative;
      transition: all 0.3s ease;
    }

    .tab:hover {
      color: #667eea;
    }

    .tab.active {
      color: #667eea;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .question-library {
      display: grid;
      gap: 1.5rem;
    }

    .question-card {
      background: white;
      border: 2px solid #eee;
      border-radius: 16px;
      padding: 2rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .question-card:hover {
      border-color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
    }

    .question-category-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .category-behavioral {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .category-technical {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .category-situational {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
    }

    .question-text {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }

    .question-meta {
      display: flex;
      gap: 1.5rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .practice-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .practice-modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 24px;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 3rem;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      color: var(--text-muted);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: #f5f5f5;
      color: var(--text-primary);
    }

    .modal-question {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      border-radius: 16px;
      margin-bottom: 2rem;
    }

    .modal-question h3 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .response-area {
      margin-bottom: 2rem;
    }

    .response-area label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--text-primary);
    }

    .response-area textarea {
      width: 100%;
      min-height: 200px;
      padding: 1rem;
      border: 2px solid #eee;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      transition: border-color 0.3s ease;
    }

    .response-area textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .coaching-result {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .coaching-result.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .score-display {
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 16px;
      margin-bottom: 2rem;
    }

    .score-value {
      font-size: 4rem;
      font-weight: 700;
    }

    .score-label {
      font-size: 1.25rem;
      opacity: 0.9;
    }

    .coaching-section {
      background: #f9fafb;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .coaching-section h4 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .coaching-list {
      list-style: none;
      padding: 0;
    }

    .coaching-list li {
      padding: 0.75rem 0;
      border-bottom: 1px solid #eee;
      color: var(--text-secondary);
    }

    .coaching-list li:last-child {
      border-bottom: none;
    }

    .improved-response {
      background: white;
      border: 2px solid #667eea;
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1rem;
      font-style: italic;
      color: var(--text-secondary);
    }

    .progress-chart {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .chart-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
    }

    .progress-bars {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .progress-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .progress-bar-container {
      height: 12px;
      background: #eee;
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 6px;
      transition: width 0.5s ease;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: white;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 2rem;
      padding: 0.75rem 1.5rem;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateX(-4px);
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .practice-mode-toggle {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      background: #f9fafb;
      padding: 0.5rem;
      border-radius: 12px;
    }

    .mode-btn {
      flex: 1;
      padding: 0.75rem 1.5rem;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      color: var(--text-muted);
    }

    .mode-btn.active {
      background: white;
      color: #667eea;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .video-practice-area {
      display: none;
      margin-bottom: 1.5rem;
    }

    .video-practice-area.active {
      display: block;
    }

    .video-preview {
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      margin-bottom: 1rem;
      position: relative;
    }

    .video-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .analysis-badge {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="practice-layout">
    <div class="practice-container">
      <a href="/candidate-dashboard.html" class="back-link">
        ← Back to Dashboard
      </a>

      <!-- Header with Stats -->
      <div class="practice-header">
        <h1>🎯 Interview Coaching</h1>
        <p>Practice with AI-powered feedback and track your progress</p>

        <div class="stats-grid" id="stats-grid">
          <div class="stat-card">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Questions Practiced</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-avg">—</span>
            <span class="stat-label">Average Score</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-improvement">—</span>
            <span class="stat-label">Improvement</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-streak">0</span>
            <span class="stat-label">Day Streak</span>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs-container">
        <div class="tabs">
          <button class="tab active" data-tab="library">📚 Question Library</button>
          <button class="tab" data-tab="progress">📊 Progress Dashboard</button>
        </div>

        <!-- Question Library Tab -->
        <div class="tab-content active" id="library-content">
          <div class="question-library" id="question-library">
            <!-- Questions will be loaded here -->
          </div>
        </div>

        <!-- Progress Dashboard Tab -->
        <div class="tab-content" id="progress-content">
          <div class="progress-chart">
            <h3 class="chart-title">Performance by Category</h3>
            <div class="progress-bars" id="category-progress">
              <!-- Progress bars will be loaded here -->
            </div>
          </div>

          <div class="progress-chart">
            <h3 class="chart-title">Recent Practice Sessions</h3>
            <div id="recent-sessions">
              <!-- Recent sessions will be loaded here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Practice Modal -->
  <div class="practice-modal" id="practice-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closePracticeModal()">×</button>

      <div id="practice-question-view">
        <div class="modal-question">
          <h3 id="modal-question-text">Question will appear here</h3>
          <div style="margin-top: 1rem; opacity: 0.9;">
            <span id="modal-category-badge"></span>
          </div>
        </div>

        <!-- Practice Mode Toggle -->
        <div class="practice-mode-toggle">
          <button class="mode-btn active" data-mode="text" onclick="switchPracticeMode('text')">
            ✍️ Text Response
          </button>
          <button class="mode-btn" data-mode="video" onclick="switchPracticeMode('video')">
            🎥 Video Response
          </button>
        </div>

        <!-- Text Response Area -->
        <div class="response-area" id="text-response-area">
          <label>Your Response</label>
          <textarea id="practice-response" placeholder="Take your time to craft a thoughtful response. Think about specific examples and use the STAR method (Situation, Task, Action, Result) for behavioral questions."></textarea>
        </div>

        <!-- Video Response Area -->
        <div class="video-practice-area" id="video-response-area">
          <div class="video-preview">
            <video id="practice-video" autoplay muted playsinline></video>
            <div id="video-analysis-badge" class="analysis-badge" style="display: none;">
              Eye Contact: <span id="live-eye-contact">—</span>
            </div>
          </div>
          <div class="video-controls">
            <button class="btn btn-secondary" id="start-video-btn" onclick="startVideoPractice()">
              Start Camera
            </button>
            <button class="btn btn-primary" id="record-video-btn" onclick="recordVideoPractice()" style="display: none;">
              🎥 Record Response
            </button>
            <button class="btn btn-danger" id="stop-video-btn" onclick="stopVideoPractice()" style="display: none;">
              ⏹️ Stop Recording
            </button>
          </div>
        </div>

        <button class="btn btn-primary btn-large btn-full" onclick="submitPracticeResponse()">
          Get AI Coaching
        </button>
      </div>

      <div id="coaching-result" class="coaching-result">
        <!-- Coaching results will be shown here -->
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: white; padding: 2rem; border-radius: 16px; text-align: center;">
      <div class="spinner-large" style="width: 48px; height: 48px; border: 4px solid #eee; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;"></div>
      <p id="loading-text" style="color: var(--text-primary); font-weight: 600;">Loading...</p>
    </div>
  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script src="/js/main.js"></script>
  <script src="/js/video-analyzer.js"></script>
  <script src="/js/interview-practice.js"></script>
  <script>
    // Video practice mode variables
    let practiceMode = 'text';
    let videoStream = null;
    let videoRecorder = null;
    let videoAnalyzer = null;
    let recordedVideoBlob = null;
    let practiceAnalysisData = null;

    // Switch practice mode
    function switchPracticeMode(mode) {
      practiceMode = mode;

      // Update toggle buttons
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.mode === mode) {
          btn.classList.add('active');
        }
      });

      // Show/hide appropriate areas
      if (mode === 'text') {
        document.getElementById('text-response-area').style.display = 'block';
        document.getElementById('video-response-area').classList.remove('active');

        // Stop video if running
        if (videoStream) {
          videoStream.getTracks().forEach(track => track.stop());
          videoStream = null;
        }
      } else {
        document.getElementById('text-response-area').style.display = 'none';
        document.getElementById('video-response-area').classList.add('active');
      }
    }

    // Start video practice
    async function startVideoPractice() {
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { width: 1280, height: 720 },
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        document.getElementById('practice-video').srcObject = videoStream;

        // Verify audio tracks
        const audioTracks = videoStream.getAudioTracks();
        if (audioTracks.length === 0) {
          console.error('No audio tracks in practice video stream');
          alert('Microphone not detected. Video will record without audio.');
        } else {
          const track = audioTracks[0];
          if (!track.enabled) track.enabled = true;
          console.log('Practice mic active:', track.label);
        }

        // Initialize video analyzer if not already done
        if (!videoAnalyzer) {
          videoAnalyzer = new VideoAnalyzer();
          await videoAnalyzer.init();

          videoAnalyzer.on('scores', (scores) => {
            document.getElementById('live-eye-contact').textContent = scores.eyeContact + '%';
            document.getElementById('video-analysis-badge').style.display = 'block';
          });
        }

        document.getElementById('start-video-btn').style.display = 'none';
        document.getElementById('record-video-btn').style.display = 'inline-flex';
      } catch (err) {
        console.error('Camera/microphone error:', err);
        alert('Camera and microphone access required for video practice. Please allow both permissions.');
      }
    }

    // Record video practice
    function recordVideoPractice() {
      try {
        // Use mimeType with both video AND audio codecs
        let mimeType = 'video/webm;codecs=vp9,opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) {
          mimeType = 'video/webm;codecs=vp8,opus';
        }
        if (!MediaRecorder.isTypeSupported(mimeType)) {
          mimeType = 'video/webm';
        }

        // Verify audio tracks before recording
        const audioTracks = videoStream.getAudioTracks();
        if (audioTracks.length === 0 || !audioTracks[0].enabled) {
          alert('Microphone is not active. Please check your mic permissions.');
          return;
        }

        videoRecorder = new MediaRecorder(videoStream, { mimeType });

        const chunks = [];
        videoRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) chunks.push(e.data);
        };

        videoRecorder.onstop = () => {
          recordedVideoBlob = new Blob(chunks, { type: 'video/webm' });
          practiceAnalysisData = videoAnalyzer ? videoAnalyzer.getFinalAnalysis() : null;

          document.getElementById('record-video-btn').style.display = 'inline-flex';
          document.getElementById('stop-video-btn').style.display = 'none';
          document.getElementById('video-analysis-badge').style.display = 'none';
        };

        videoRecorder.start();

        if (videoAnalyzer) {
          videoAnalyzer.reset();
          videoAnalyzer.startAnalysis(document.getElementById('practice-video'), 500);
        }

        document.getElementById('record-video-btn').style.display = 'none';
        document.getElementById('stop-video-btn').style.display = 'inline-flex';
      } catch (err) {
        console.error('Recording error:', err);
        alert('Failed to start recording.');
      }
    }

    // Stop video practice
    function stopVideoPractice() {
      if (videoRecorder && videoRecorder.state !== 'inactive') {
        videoRecorder.stop();

        if (videoAnalyzer) {
          videoAnalyzer.stopAnalysis();
        }
      }
    }

    // Override submitPracticeResponse to handle video mode
    const originalSubmit = submitPracticeResponse;
    submitPracticeResponse = async function() {
      if (practiceMode === 'video') {
        if (!recordedVideoBlob) {
          alert('Please record a video response first.');
          return;
        }

        showLoading('AI is analyzing your video response...');

        try {
          // For now, just display coaching based on video analysis
          hideLoading();
          displayVideoPracticeCoaching();
        } catch (err) {
          hideLoading();
          alert('Failed to analyze video: ' + err.message);
        }
      } else {
        originalSubmit();
      }
    };

    // Display video practice coaching
    function displayVideoPracticeCoaching() {
      if (!practiceAnalysisData) {
        alert('No analysis data available.');
        return;
      }

      const scores = practiceAnalysisData.scores;
      const resultContainer = document.getElementById('coaching-result');

      const insights = [];

      if (scores.eyeContact >= 70) {
        insights.push('✅ Strong eye contact maintained throughout');
      } else {
        insights.push('💡 Practice looking directly at the camera lens');
      }

      if (scores.bodyLanguage >= 70) {
        insights.push('✅ Good posture and head stability');
      } else {
        insights.push('💡 Keep your head steady and maintain good posture');
      }

      if (scores.presentation >= 70) {
        insights.push('✅ Excellent overall video presence');
      } else {
        insights.push('💡 Practice recording yourself to improve presence');
      }

      resultContainer.innerHTML = `
        <div class="score-display">
          <div class="score-value">${scores.presentation}/100</div>
          <div class="score-label">Presentation Score</div>
        </div>

        <div class="coaching-section">
          <h4>📊 Video Analysis</h4>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem;">
            <div style="text-align: center; padding: 1rem; background: white; border-radius: 12px;">
              <div style="font-size: 2rem; font-weight: 700; color: #667eea;">${scores.eyeContact}</div>
              <div style="font-size: 0.875rem; color: #64748b;">Eye Contact</div>
            </div>
            <div style="text-align: center; padding: 1rem; background: white; border-radius: 12px;">
              <div style="font-size: 2rem; font-weight: 700; color: #667eea;">${scores.bodyLanguage}</div>
              <div style="font-size: 0.875rem; color: #64748b;">Body Language</div>
            </div>
            <div style="text-align: center; padding: 1rem; background: white; border-radius: 12px;">
              <div style="font-size: 2rem; font-weight: 700; color: #667eea;">${scores.expression}</div>
              <div style="font-size: 0.875rem; color: #64748b;">Expression</div>
            </div>
          </div>
        </div>

        <div class="coaching-section">
          <h4>💡 Key Insights</h4>
          <ul class="coaching-list">
            ${insights.map(i => `<li>${i}</li>`).join('')}
          </ul>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button class="btn btn-ghost btn-large" onclick="closePracticeModal()" style="flex: 1;">
            Close
          </button>
          <button class="btn btn-primary btn-large" onclick="practiceAnother()" style="flex: 1;">
            Practice Another
          </button>
        </div>
      `;

      document.getElementById('practice-question-view').style.display = 'none';
      resultContainer.style.display = 'block';
      resultContainer.classList.add('active');
    }

    // Clean up video when modal closes
    const originalClose = closePracticeModal;
    closePracticeModal = function() {
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }

      if (videoAnalyzer) {
        videoAnalyzer.stopAnalysis();
      }

      recordedVideoBlob = null;
      practiceAnalysisData = null;

      // Reset UI
      document.getElementById('start-video-btn').style.display = 'inline-flex';
      document.getElementById('record-video-btn').style.display = 'none';
      document.getElementById('stop-video-btn').style.display = 'none';
      document.getElementById('video-analysis-badge').style.display = 'none';

      practiceMode = 'text';
      switchPracticeMode('text');

      originalClose();
    };
  </script>
</body>
</html>
