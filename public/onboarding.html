<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Onboarding - Rekrut AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <div class="mb-8">
      <h1 class="text-4xl font-bold text-white mb-2">
        <i class="fas fa-rocket mr-3 text-purple-400"></i>
        My Onboarding
      </h1>
      <p class="text-gray-300">Welcome! Complete your onboarding journey</p>
    </div>

    <button onclick="location.href='candidate-dashboard.html'" class="mb-6 bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-lg transition">
      <i class="fas fa-arrow-left mr-2"></i>
      Back to Dashboard
    </button>

    <!-- Job Offers Section -->
    <div id="offersSection" class="mb-8">
      <h2 class="text-2xl font-bold text-white mb-4">
        <i class="fas fa-envelope-open-text mr-2 text-yellow-400"></i>
        My Job Offers
      </h2>
      <div id="offersList" class="grid gap-6">
        <div class="text-center py-12 text-gray-400">
          <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
          <p>Loading offers...</p>
        </div>
      </div>
    </div>

    <!-- Onboarding Checklists Section -->
    <div id="checklistsSection" class="hidden">
      <h2 class="text-2xl font-bold text-white mb-4">
        <i class="fas fa-tasks mr-2 text-green-400"></i>
        Onboarding Checklist
      </h2>
      <div id="checklistsList" class="grid gap-6"></div>
    </div>

    <!-- Onboarding Assistant Section -->
    <div class="mt-8 bg-white/10 backdrop-blur-lg rounded-xl border border-white/20 p-6">
      <h2 class="text-2xl font-bold text-white mb-4">
        <i class="fas fa-robot mr-2 text-purple-400"></i>
        Onboarding Assistant
      </h2>
      <p class="text-gray-300 mb-6">Ask me anything about your onboarding, company policies, or first day!</p>

      <div id="chatMessages" class="bg-slate-800/50 rounded-lg p-4 mb-4 h-64 overflow-y-auto space-y-3">
        <div class="text-gray-400 text-center text-sm">Start a conversation by typing a question below</div>
      </div>

      <div class="flex gap-3">
        <input
          type="text"
          id="chatInput"
          placeholder="Ask a question..."
          class="flex-1 px-4 py-3 bg-slate-700 border border-gray-600 rounded-lg text-white focus:ring-2 focus:ring-purple-500"
          onkeypress="if(event.key === 'Enter') sendMessage()"
        >
        <button onclick="sendMessage()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg font-semibold transition">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Offer Detail Modal -->
  <div id="offerModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50">
    <div class="bg-slate-800 rounded-2xl p-8 max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-white">Offer Letter</h2>
        <button onclick="closeOfferModal()" class="text-gray-400 hover:text-white">
          <i class="fas fa-times text-2xl"></i>
        </button>
      </div>

      <div id="offerContent" class="bg-white rounded-lg p-8 mb-6 text-gray-900">
        <!-- Offer content will be injected here -->
      </div>

      <div id="offerActions" class="flex gap-4">
        <!-- Action buttons will be injected here -->
      </div>
    </div>
  </div>

  <script>
    let currentOffer = null;
    let currentSession = null;

    async function loadOffers() {
      try {
        const res = await fetch('/api/onboarding/offers/me');
        const offers = await res.json();

        const offersList = document.getElementById('offersList');

        if (offers.length === 0) {
          offersList.innerHTML = `
            <div class="bg-white/10 backdrop-blur-lg rounded-xl p-8 text-center border border-white/20">
              <i class="fas fa-inbox text-4xl text-gray-400 mb-4"></i>
              <p class="text-gray-300">No job offers yet</p>
            </div>
          `;
          return;
        }

        offersList.innerHTML = offers.map(offer => `
          <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/20">
            <div class="flex justify-between items-start mb-4">
              <div>
                <h3 class="text-xl font-bold text-white mb-1">${offer.title}</h3>
                <p class="text-gray-400">${offer.company_name}</p>
              </div>
              ${getOfferStatusBadge(offer.status)}
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
              <div>
                <div class="text-gray-400 text-sm">Annual Salary</div>
                <div class="text-white font-semibold text-lg">$${parseInt(offer.salary).toLocaleString()}</div>
              </div>
              <div>
                <div class="text-gray-400 text-sm">Start Date</div>
                <div class="text-white font-semibold">${offer.start_date ? new Date(offer.start_date).toLocaleDateString() : 'TBD'}</div>
              </div>
            </div>

            <button onclick="viewOffer(${offer.id})" class="w-full bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg font-semibold transition">
              <i class="fas fa-eye mr-2"></i>
              View Full Offer
            </button>
          </div>
        `).join('');

        // Check if any offers accepted - show checklists
        if (offers.some(o => o.status === 'accepted')) {
          loadChecklists();
        }
      } catch (err) {
        console.error('Error loading offers:', err);
      }
    }

    async function loadChecklists() {
      try {
        const res = await fetch('/api/onboarding/checklists');
        const checklists = await res.json();

        if (checklists.length === 0) return;

        document.getElementById('checklistsSection').classList.remove('hidden');

        const checklistsList = document.getElementById('checklistsList');
        checklistsList.innerHTML = checklists.map(checklist => {
          const items = checklist.items || [];
          const completedItems = checklist.completed_items || [];
          const progress = items.length > 0 ? (completedItems.length / items.length * 100) : 0;

          return `
            <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 border border-white/20">
              <div class="flex justify-between items-start mb-4">
                <div>
                  <h3 class="text-xl font-bold text-white mb-1">${checklist.title}</h3>
                  <p class="text-gray-400">${checklist.description || ''}</p>
                </div>
                <span class="text-sm text-gray-300">${completedItems.length}/${items.length} complete</span>
              </div>

              <div class="mb-6">
                <div class="bg-gray-700 rounded-full h-3 overflow-hidden">
                  <div class="bg-gradient-to-r from-purple-500 to-pink-500 h-full transition-all" style="width: ${progress}%"></div>
                </div>
              </div>

              <div class="space-y-3">
                ${items.map(item => `
                  <div class="flex items-center gap-3 p-3 bg-slate-800/50 rounded-lg">
                    <input
                      type="checkbox"
                      ${completedItems.includes(item.id) ? 'checked' : ''}
                      onchange="toggleChecklistItem(${checklist.id}, ${item.id})"
                      class="w-5 h-5 text-purple-600 rounded focus:ring-purple-500"
                    >
                    <span class="text-white ${completedItems.includes(item.id) ? 'line-through text-gray-500' : ''}">${item.task}</span>
                    ${item.required ? '<span class="ml-auto text-xs text-red-400">Required</span>' : ''}
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Error loading checklists:', err);
      }
    }

    async function viewOffer(offerId) {
      try {
        const res = await fetch('/api/onboarding/offers/me');
        const offers = await res.json();
        currentOffer = offers.find(o => o.id === offerId);

        if (!currentOffer) return;

        // Mark as viewed
        await fetch(`/api/onboarding/offers/${offerId}/view`, { method: 'POST' });

        const offerContent = document.getElementById('offerContent');
        offerContent.innerHTML = `
          <div class="text-center mb-6">
            <h3 class="text-2xl font-bold mb-2">${currentOffer.company_name}</h3>
            <h4 class="text-xl text-gray-600">Offer of Employment</h4>
          </div>

          <div class="space-y-4">
            <p>Dear ${currentOffer.candidate_name || 'Candidate'},</p>

            <p>We are pleased to offer you the position of <strong>${currentOffer.title}</strong> at ${currentOffer.company_name}.</p>

            <div class="bg-gray-50 p-4 rounded-lg">
              <h5 class="font-bold mb-2">Compensation & Benefits</h5>
              <ul class="space-y-2">
                <li><strong>Annual Salary:</strong> $${parseInt(currentOffer.salary).toLocaleString()}</li>
                <li><strong>Start Date:</strong> ${currentOffer.start_date ? new Date(currentOffer.start_date).toLocaleDateString() : 'To be determined'}</li>
                ${currentOffer.benefits ? `<li><strong>Benefits:</strong> ${currentOffer.benefits}</li>` : ''}
              </ul>
            </div>

            <p>We look forward to welcoming you to our team!</p>

            <p class="text-sm text-gray-600 mt-6">
              This offer is contingent upon successful completion of background checks and verification of eligibility to work.
            </p>
          </div>
        `;

        const offerActions = document.getElementById('offerActions');
        if (currentOffer.status === 'sent') {
          offerActions.innerHTML = `
            <button onclick="acceptOffer()" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-semibold transition">
              <i class="fas fa-check mr-2"></i>
              Accept Offer
            </button>
            <button onclick="showDeclineReason()" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-semibold transition">
              <i class="fas fa-times mr-2"></i>
              Decline Offer
            </button>
          `;
        } else if (currentOffer.status === 'accepted') {
          offerActions.innerHTML = `
            <div class="flex-1 text-center text-green-400">
              <i class="fas fa-check-circle mr-2"></i>
              You accepted this offer on ${new Date(currentOffer.accepted_at).toLocaleDateString()}
            </div>
          `;
        } else if (currentOffer.status === 'declined') {
          offerActions.innerHTML = `
            <div class="flex-1 text-center text-red-400">
              <i class="fas fa-times-circle mr-2"></i>
              You declined this offer on ${new Date(currentOffer.declined_at).toLocaleDateString()}
            </div>
          `;
        }

        document.getElementById('offerModal').classList.remove('hidden');
        document.getElementById('offerModal').classList.add('flex');
      } catch (err) {
        console.error('Error viewing offer:', err);
      }
    }

    async function acceptOffer() {
      if (!confirm('Accept this job offer?')) return;

      try {
        const res = await fetch(`/api/onboarding/offers/${currentOffer.id}/accept`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ signature_url: 'digital_signature_placeholder' })
        });

        if (!res.ok) throw new Error('Failed to accept offer');

        alert('Congratulations! Offer accepted successfully.');
        closeOfferModal();
        loadOffers();
      } catch (err) {
        console.error('Error accepting offer:', err);
        alert('Failed to accept offer. Please try again.');
      }
    }

    function showDeclineReason() {
      const reason = prompt('Please tell us why you are declining this offer (optional):');
      if (reason !== null) {
        declineOffer(reason);
      }
    }

    async function declineOffer(reason) {
      try {
        const res = await fetch(`/api/onboarding/offers/${currentOffer.id}/decline`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason })
        });

        if (!res.ok) throw new Error('Failed to decline offer');

        alert('Offer declined.');
        closeOfferModal();
        loadOffers();
      } catch (err) {
        console.error('Error declining offer:', err);
        alert('Failed to decline offer. Please try again.');
      }
    }

    async function toggleChecklistItem(checklistId, itemId) {
      try {
        const res = await fetch(`/api/onboarding/checklists/${checklistId}/complete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ item_id: itemId })
        });

        if (!res.ok) throw new Error('Failed to update checklist');

        loadChecklists();
      } catch (err) {
        console.error('Error updating checklist:', err);
      }
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;

      const messagesDiv = document.getElementById('chatMessages');

      // Remove welcome message if present
      if (messagesDiv.querySelector('.text-center')) {
        messagesDiv.innerHTML = '';
      }

      // Add user message
      messagesDiv.innerHTML += `
        <div class="flex justify-end">
          <div class="bg-purple-600 text-white rounded-lg px-4 py-2 max-w-xs">
            ${message}
          </div>
        </div>
      `;

      input.value = '';
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      // Show loading
      messagesDiv.innerHTML += `
        <div class="flex justify-start">
          <div class="bg-slate-700 text-gray-300 rounded-lg px-4 py-2">
            <i class="fas fa-spinner fa-spin mr-2"></i>Thinking...
          </div>
        </div>
      `;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      try {
        const res = await fetch('/api/onboarding/assistant/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, checklist_id: null })
        });

        const data = await res.json();
        currentSession = data.session_id;

        // Remove loading
        const loadingMsg = messagesDiv.querySelector('.fa-spinner').parentElement.parentElement;
        loadingMsg.remove();

        // Add AI response
        messagesDiv.innerHTML += `
          <div class="flex justify-start">
            <div class="bg-slate-700 text-white rounded-lg px-4 py-2 max-w-md">
              ${data.response}
            </div>
          </div>
        `;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      } catch (err) {
        console.error('Error sending message:', err);
        messagesDiv.querySelector('.fa-spinner').parentElement.parentElement.remove();
        messagesDiv.innerHTML += `
          <div class="flex justify-start">
            <div class="bg-red-600 text-white rounded-lg px-4 py-2">
              Sorry, I'm having trouble connecting. Please try again.
            </div>
          </div>
        `;
      }
    }

    function closeOfferModal() {
      document.getElementById('offerModal').classList.add('hidden');
      document.getElementById('offerModal').classList.remove('flex');
    }

    function getOfferStatusBadge(status) {
      const badges = {
        draft: '<span class="px-3 py-1 bg-gray-600 text-white text-xs rounded-full">Draft</span>',
        sent: '<span class="px-3 py-1 bg-yellow-600 text-white text-xs rounded-full">Pending Response</span>',
        accepted: '<span class="px-3 py-1 bg-green-600 text-white text-xs rounded-full">Accepted</span>',
        declined: '<span class="px-3 py-1 bg-red-600 text-white text-xs rounded-full">Declined</span>'
      };
      return badges[status] || badges.draft;
    }

    loadOffers();
  </script>
</body>
</html>
