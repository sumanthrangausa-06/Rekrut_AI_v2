<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Dashboard — HireLoop</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/globals.css">
</head>
<body>
  <!-- Loading screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner spinner-dark"></div>
  </div>

  <div id="app" style="display:none;"></div>

  <!-- Page content template -->
  <template id="dashboardContent">
    <!-- Welcome Banner -->
    <div class="card" style="background:linear-gradient(135deg,#eef2ff,#f5f3ff);border-color:#c7d2fe;margin-bottom:1.5rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <h2 style="font-size:1.25rem;font-weight:700;color:#0f172a;margin-bottom:0.25rem;" id="welcomeMsg">Welcome back!</h2>
          <p style="font-size:0.875rem;color:#64748b;">Track your applications, improve your skills, and land your dream job.</p>
        </div>
        <a href="/job-board.html" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Browse Jobs
        </a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Applications</div>
        <div class="stat-value" id="statApps">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Interviews</div>
        <div class="stat-value" id="statInterviews">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Assessments</div>
        <div class="stat-value" id="statAssessments">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">OmniScore</div>
        <div class="stat-value" id="statOmniScore">—</div>
      </div>
    </div>

    <!-- Modules Grid -->
    <h3 style="font-size:1rem;font-weight:600;color:#0f172a;margin-bottom:1rem;">Your Tools</h3>
    <div class="module-grid">
      <a href="/job-board.html" class="module-card">
        <div class="module-icon" style="background:#eef2ff;color:#4f46e5;">&#128270;</div>
        <div class="module-name">Job Board</div>
        <div class="module-desc">Browse and apply to open positions matching your skills.</div>
      </a>
      <a href="/history.html" class="module-card">
        <div class="module-icon" style="background:#ecfdf5;color:#059669;">&#128196;</div>
        <div class="module-name">My Applications</div>
        <div class="module-desc">Track your application status and interview progress.</div>
      </a>
      <a href="/interview-practice.html" class="module-card">
        <div class="module-icon" style="background:#faf5ff;color:#7c3aed;">&#129302;</div>
        <div class="module-name">AI Interview Coach</div>
        <div class="module-desc">Practice interviews with AI feedback and coaching tips.</div>
        <span class="badge badge-primary" style="margin-top:0.5rem;">AI</span>
      </a>
      <a href="/skill-assessments.html" class="module-card">
        <div class="module-icon" style="background:#fff7ed;color:#ea580c;">&#9989;</div>
        <div class="module-name">Skill Assessments</div>
        <div class="module-desc">Take AI-generated tests to verify and showcase your skills.</div>
      </a>
      <a href="/omniscore.html" class="module-card">
        <div class="module-icon" style="background:#fef3c7;color:#d97706;">&#11088;</div>
        <div class="module-name">OmniScore</div>
        <div class="module-desc">Your comprehensive candidate score — see how you rank.</div>
      </a>
      <a href="/candidate-profile.html" class="module-card">
        <div class="module-icon" style="background:#f1f5f9;color:#475569;">&#128100;</div>
        <div class="module-name">My Profile</div>
        <div class="module-desc">Update your resume, skills, experience, and portfolio.</div>
      </a>
      <a href="/documents.html" class="module-card">
        <div class="module-icon" style="background:#ecfeff;color:#0891b2;">&#128194;</div>
        <div class="module-name">Documents</div>
        <div class="module-desc">Upload and manage your verification documents.</div>
      </a>
      <a href="/onboarding.html" class="module-card">
        <div class="module-icon" style="background:#fdf2f8;color:#db2777;">&#128203;</div>
        <div class="module-name">Onboarding</div>
        <div class="module-desc">Complete your onboarding documents and e-signatures.</div>
      </a>
    </div>

    <!-- Recent Activity -->
    <div style="margin-top:2rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <h3 style="font-size:1rem;font-weight:600;color:#0f172a;">Recent Applications</h3>
        <a href="/history.html" class="text-sm text-indigo-600 font-medium">View all &rarr;</a>
      </div>
      <div class="card" id="recentApps">
        <div style="display:flex;justify-content:center;padding:2rem;"><div class="spinner spinner-dark"></div></div>
      </div>
    </div>
  </template>

  <script src="/js/core.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    // Handle OAuth token in URL params
    const urlParams = new URLSearchParams(window.location.search);
    const tokenParam = urlParams.get('token');
    const refreshParam = urlParams.get('refresh');
    if (tokenParam) {
      Auth.setTokens(tokenParam, refreshParam);
      window.history.replaceState({}, '', '/candidate-dashboard.html');
    }

    (async () => {
      const ok = await Auth.require(['candidate']);
      if (!ok) return;

      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      const template = document.getElementById('dashboardContent');
      const pageContent = document.createElement('div');
      pageContent.id = 'page-content';
      pageContent.innerHTML = template.innerHTML;
      document.getElementById('app').appendChild(pageContent);

      UI.initDashboard({ title: 'Dashboard', subtitle: 'Your career hub' });

      // Personalize welcome
      const user = Auth.getUser();
      const welcomeEl = document.getElementById('welcomeMsg');
      if (welcomeEl && user?.name) {
        welcomeEl.textContent = `Welcome back, ${user.name.split(' ')[0]}!`;
      }

      loadStats();
      loadRecentApplications();
    })();

    async function loadStats() {
      // Applications
      try {
        const data = await API.get('/candidate/applications');
        const apps = data.applications || data || [];
        document.getElementById('statApps').textContent = Array.isArray(apps) ? apps.length : 0;
      } catch { document.getElementById('statApps').textContent = '0'; }

      // Interviews
      try {
        const data = await API.get('/interviews/my');
        const interviews = data.interviews || data || [];
        document.getElementById('statInterviews').textContent = Array.isArray(interviews) ? interviews.length : 0;
      } catch { document.getElementById('statInterviews').textContent = '0'; }

      // Assessments
      try {
        const data = await API.get('/assessments/sessions');
        const sessions = data.sessions || data || [];
        document.getElementById('statAssessments').textContent = Array.isArray(sessions) ? sessions.length : 0;
      } catch { document.getElementById('statAssessments').textContent = '0'; }

      // OmniScore
      try {
        const data = await API.get('/omniscore/me');
        const score = data.overall_score || data.score || data.omniScore;
        document.getElementById('statOmniScore').textContent = score ? Math.round(score) : '—';
      } catch { document.getElementById('statOmniScore').textContent = '—'; }
    }

    async function loadRecentApplications() {
      const container = document.getElementById('recentApps');
      try {
        const data = await API.get('/candidate/applications');
        const apps = (data.applications || data || []).slice(0, 5);

        if (apps.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <h3>No applications yet</h3>
              <p>Start applying to jobs to track your progress here.</p>
              <a href="/job-board.html" class="btn btn-primary" style="margin-top:0.5rem;">Browse Jobs</a>
            </div>`;
          return;
        }

        container.innerHTML = `
          <div class="table-wrapper">
            <table>
              <thead><tr>
                <th>Position</th>
                <th>Company</th>
                <th>Status</th>
                <th>Applied</th>
              </tr></thead>
              <tbody>
                ${apps.map(app => `
                  <tr>
                    <td style="font-weight:500;">${Utils.escapeHtml(app.job_title || app.title || '—')}</td>
                    <td>${Utils.escapeHtml(app.company || app.company_name || '—')}</td>
                    <td><span class="badge badge-${app.status === 'pending' ? 'warning' : app.status === 'accepted' ? 'success' : app.status === 'rejected' ? 'danger' : 'neutral'}">${app.status || 'pending'}</span></td>
                    <td style="color:#64748b;">${Utils.formatRelative(app.created_at || app.applied_at)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>`;
      } catch (err) {
        container.innerHTML = '<p style="padding:1rem;color:#64748b;text-align:center;">Unable to load applications</p>';
      }
    }
  </script>
  <script defer src="https://polsia.com/analytics.js" data-slug="hireloop"></script>
</body>
</html>
