<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruiter Dashboard — HireLoop</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/globals.css">
</head>
<body>
  <!-- Loading screen while auth checks -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner spinner-dark"></div>
  </div>

  <div id="app" style="display:none;"></div>

  <!-- Page content template -->
  <template id="dashboardContent">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Active Jobs</div>
        <div class="stat-value" id="statJobs">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Applications</div>
        <div class="stat-value" id="statApps">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Interviews Scheduled</div>
        <div class="stat-value" id="statInterviews">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending Offers</div>
        <div class="stat-value" id="statOffers">—</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div style="margin-bottom:1.5rem;">
      <h3 style="font-size:1rem;font-weight:600;color:#0f172a;margin-bottom:1rem;">Quick Actions</h3>
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
        <a href="/job-create.html" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Post New Job
        </a>
        <a href="/recruiter-applications.html" class="btn btn-secondary">View Applications</a>
        <a href="/recruiter-interviews.html" class="btn btn-secondary">Manage Interviews</a>
      </div>
    </div>

    <!-- Modules Grid -->
    <h3 style="font-size:1rem;font-weight:600;color:#0f172a;margin-bottom:1rem;">Recruitment Modules</h3>
    <div class="module-grid">
      <a href="/recruiter-jobs.html" class="module-card">
        <div class="module-icon" style="background:#eef2ff;color:#4f46e5;">&#128188;</div>
        <div class="module-name">Job Postings</div>
        <div class="module-desc">Create and manage job listings. Track views and applications.</div>
      </a>
      <a href="/recruiter-applications.html" class="module-card">
        <div class="module-icon" style="background:#ecfdf5;color:#059669;">&#128196;</div>
        <div class="module-name">Applications</div>
        <div class="module-desc">Review candidates, filter by skills, and manage your pipeline.</div>
      </a>
      <a href="/recruiter-interviews.html" class="module-card">
        <div class="module-icon" style="background:#faf5ff;color:#7c3aed;">&#127909;</div>
        <div class="module-name">Interviews</div>
        <div class="module-desc">Schedule, conduct, and review video interviews with AI analysis.</div>
      </a>
      <a href="/offer-management.html" class="module-card">
        <div class="module-icon" style="background:#fff7ed;color:#ea580c;">&#128221;</div>
        <div class="module-name">Offer Management</div>
        <div class="module-desc">Create, send, and track offer letters. Negotiate terms.</div>
      </a>
      <a href="/matching.html" class="module-card">
        <div class="module-icon" style="background:#f0fdf4;color:#16a34a;">&#129302;</div>
        <div class="module-name">AI Matching Engine</div>
        <div class="module-desc">AI-powered candidate-job matching with skills analysis.</div>
        <span class="badge badge-primary" style="margin-top:0.5rem;">AI</span>
      </a>
      <a href="/recruiter-trustscore.html" class="module-card">
        <div class="module-icon" style="background:#eff6ff;color:#2563eb;">&#128737;</div>
        <div class="module-name">Trust Score</div>
        <div class="module-desc">Verify candidate credentials and assess reliability.</div>
      </a>
      <a href="/recruiter-onboarding-docs.html" class="module-card">
        <div class="module-icon" style="background:#fef3c7;color:#d97706;">&#128203;</div>
        <div class="module-name">Onboarding</div>
        <div class="module-desc">AI-automated onboarding with document collection and e-signatures.</div>
      </a>
      <a href="/payroll-dashboard.html" class="module-card">
        <div class="module-icon" style="background:#ecfeff;color:#0891b2;">&#128176;</div>
        <div class="module-name">Payroll</div>
        <div class="module-desc">Run payroll, manage tax documents, and track payments.</div>
      </a>
      <a href="/compliance-dashboard.html" class="module-card">
        <div class="module-icon" style="background:#fdf2f8;color:#db2777;">&#128274;</div>
        <div class="module-name">Compliance</div>
        <div class="module-desc">GDPR compliance, data retention, and consent management.</div>
      </a>
      <a href="/recruiter-analytics.html" class="module-card">
        <div class="module-icon" style="background:#f5f3ff;color:#7c3aed;">&#128200;</div>
        <div class="module-name">Analytics</div>
        <div class="module-desc">Hiring funnel metrics, time-to-hire, and source tracking.</div>
      </a>
      <a href="/company-profile.html" class="module-card">
        <div class="module-icon" style="background:#f1f5f9;color:#475569;">&#127970;</div>
        <div class="module-name">Company Profile</div>
        <div class="module-desc">Set up your company page visible to candidates.</div>
      </a>
    </div>

    <!-- Recent Applications -->
    <div style="margin-top:2rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <h3 style="font-size:1rem;font-weight:600;color:#0f172a;">Recent Applications</h3>
        <a href="/recruiter-applications.html" class="text-sm text-indigo-600 font-medium">View all &rarr;</a>
      </div>
      <div class="card" id="recentApps">
        <div style="display:flex;justify-content:center;padding:2rem;"><div class="spinner spinner-dark"></div></div>
      </div>
    </div>
  </template>

  <script src="/js/core.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    // Handle OAuth token in URL params
    const urlParams = new URLSearchParams(window.location.search);
    const tokenParam = urlParams.get('token');
    const refreshParam = urlParams.get('refresh');
    if (tokenParam) {
      Auth.setTokens(tokenParam, refreshParam);
      // Clean URL
      window.history.replaceState({}, '', '/recruiter-dashboard.html');
    }

    (async () => {
      const ok = await Auth.require(['recruiter','employer','hiring_manager','admin']);
      if (!ok) return;

      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      // Get template content
      const template = document.getElementById('dashboardContent');
      const pageContent = document.createElement('div');
      pageContent.id = 'page-content';
      pageContent.innerHTML = template.innerHTML;
      document.getElementById('app').appendChild(pageContent);

      UI.initDashboard({ title: 'Recruiter Dashboard', subtitle: 'Manage your hiring pipeline' });

      // Load stats
      loadStats();
      loadRecentApplications();
    })();

    async function loadStats() {
      try {
        // Load jobs count
        const jobsData = await API.get('/recruiter/jobs');
        const jobs = jobsData.jobs || jobsData || [];
        document.getElementById('statJobs').textContent = Array.isArray(jobs) ? jobs.filter(j => j.status === 'active').length : 0;

        // Load applications
        try {
          const appsData = await API.get('/recruiter/applications');
          const apps = appsData.applications || appsData || [];
          document.getElementById('statApps').textContent = Array.isArray(apps) ? apps.length : 0;
        } catch { document.getElementById('statApps').textContent = '0'; }

        // Load interviews
        try {
          const intData = await API.get('/interviews/scheduled');
          const interviews = intData.interviews || intData || [];
          document.getElementById('statInterviews').textContent = Array.isArray(interviews) ? interviews.length : 0;
        } catch { document.getElementById('statInterviews').textContent = '0'; }

        // Load offers
        try {
          const offersData = await API.get('/recruiter/offers');
          const offers = offersData.offers || offersData || [];
          document.getElementById('statOffers').textContent = Array.isArray(offers) ? offers.filter(o => o.status === 'pending').length : 0;
        } catch { document.getElementById('statOffers').textContent = '0'; }
      } catch (err) {
        console.error('Stats error:', err);
      }
    }

    async function loadRecentApplications() {
      const container = document.getElementById('recentApps');
      try {
        const data = await API.get('/recruiter/applications');
        const apps = (data.applications || data || []).slice(0, 5);

        if (apps.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <h3>No applications yet</h3>
              <p>Post a job to start receiving applications from candidates.</p>
              <a href="/job-create.html" class="btn btn-primary" style="margin-top:0.5rem;">Post Your First Job</a>
            </div>`;
          return;
        }

        container.innerHTML = `
          <div class="table-wrapper">
            <table>
              <thead><tr>
                <th>Candidate</th>
                <th>Position</th>
                <th>Status</th>
                <th>Applied</th>
              </tr></thead>
              <tbody>
                ${apps.map(app => `
                  <tr>
                    <td style="font-weight:500;">${Utils.escapeHtml(app.candidate_name || app.name || 'Unknown')}</td>
                    <td>${Utils.escapeHtml(app.job_title || app.title || '—')}</td>
                    <td><span class="badge badge-${app.status === 'pending' ? 'warning' : app.status === 'accepted' ? 'success' : 'neutral'}">${app.status || 'pending'}</span></td>
                    <td style="color:#64748b;">${Utils.formatRelative(app.created_at || app.applied_at)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>`;
      } catch (err) {
        container.innerHTML = '<p style="padding:1rem;color:#64748b;text-align:center;">Unable to load applications</p>';
      }
    }
  </script>
  <script defer src="https://polsia.com/analytics.js" data-slug="hireloop"></script>
</body>
</html>
