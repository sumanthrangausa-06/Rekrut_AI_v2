<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview History - Rekrut AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="/" class="logo">
        <span class="logo-icon">◎</span>
        <span>Rekrut AI</span>
      </a>
      
      <nav class="sidebar-nav">
        <a href="/candidate-dashboard.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span>Dashboard</span>
        </a>
        <a href="/candidate-profile.html" class="nav-item">
          <span class="nav-icon">👤</span>
          <span>My Profile</span>
        </a>
        <a href="/omniscore.html" class="nav-item">
          <span class="nav-icon">🎯</span>
          <span>OmniScore</span>
        </a>
        <a href="/skill-assessments.html" class="nav-item">
          <span class="nav-icon">📝</span>
          <span>Skill Tests</span>
        </a>
        <a href="/interview.html" class="nav-item">
          <span class="nav-icon">🎤</span>
          <span>Interview Prep</span>
        </a>
        <a href="/job-board.html" class="nav-item">
          <span class="nav-icon">💼</span>
          <span>Job Board</span>
        </a>
        <a href="/history.html" class="nav-item active">
          <span class="nav-icon">📁</span>
          <span>History</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <button onclick="handleLogout()" class="btn btn-ghost btn-sm btn-full">Logout</button>
      </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <div>
          <h1>Interview History</h1>
          <p>Review your past mock interviews and track progress</p>
        </div>
        <a href="/interview.html" class="btn btn-primary">
          <span>🎤</span> New Interview
        </a>
      </header>
      
      <!-- Interview List -->
      <div class="interview-list" id="interview-list">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading your interview history...</p>
        </div>
      </div>
    </main>
  </div>
  
  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkAuth();
      if (!user) {
        window.location.href = '/login.html';
        return;
      }
      
      loadHistory();
    });
    
    async function loadHistory() {
      try {
        const data = await apiCall('/interviews/history?limit=50');
        const list = document.getElementById('interview-list');
        
        if (!data || data.interviews.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <p>🎤 No interviews yet</p>
              <p style="color: var(--text-muted); margin-bottom: 20px;">Start practicing to build your interview history</p>
              <a href="/interview.html" class="btn btn-primary">Start Mock Interview</a>
            </div>
          `;
          return;
        }
        
        list.innerHTML = data.interviews.map(interview => {
          const date = new Date(interview.created_at).toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric'
          });
          
          const statusBadge = interview.status === 'completed' 
            ? `<span class="badge completed">✓ Completed</span>`
            : `<span class="badge in-progress">● In Progress</span>`;
          
          const score = interview.overall_score 
            ? `<div class="history-score"><span class="score">${interview.overall_score}</span>/10</div>`
            : `<div class="history-score"><span class="pending">--</span></div>`;
          
          return `
            <div class="history-item">
              <div class="history-info">
                <div class="history-meta">
                  ${statusBadge}
                  <span class="history-date">${date}</span>
                </div>
                <div class="history-title">
                  ${interview.job_title || interview.interview_type} Interview
                </div>
                <div class="history-questions">
                  ${Array.isArray(interview.questions) ? interview.questions.length : 0} questions
                </div>
              </div>
              ${score}
              <a href="/interview.html?id=${interview.id}" class="btn btn-ghost btn-sm">
                ${interview.status === 'completed' ? 'Review' : 'Continue'}
              </a>
            </div>
          `;
        }).join('');
        
      } catch (err) {
        console.error('Failed to load history:', err);
      }
    }
  </script>
  
  <style>
    .history-item {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 24px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .history-item:last-child {
      border-bottom: none;
    }
    
    .history-info {
      flex: 1;
    }
    
    .history-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    
    .badge {
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 500;
    }
    
    .badge.completed {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-primary);
    }
    
    .badge.in-progress {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
    }
    
    .history-date {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .history-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: capitalize;
    }
    
    .history-questions {
      font-size: 14px;
      color: var(--text-muted);
    }
    
    .history-score {
      text-align: center;
      min-width: 80px;
    }
    
    .history-score .score {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      color: var(--accent-primary);
    }
    
    .history-score .pending {
      font-size: 24px;
      color: var(--text-muted);
    }
  </style>
</body>
</html>
