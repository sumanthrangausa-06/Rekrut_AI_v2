<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — HireLoop</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/globals.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="max-width:480px;">
      <div class="auth-logo">
        <a href="/"><h1>Hire<span style="color:#4f46e5;">Loop</span></h1></a>
        <p>Create your free account</p>
      </div>

      <!-- Error Message -->
      <div id="errorMsg" style="display:none;background:#fef2f2;color:#dc2626;padding:0.75rem 1rem;border-radius:0.5rem;font-size:0.875rem;margin-bottom:1rem;"></div>

      <!-- Role Selector -->
      <div class="role-selector" id="roleSelector">
        <div class="role-option active" data-role="candidate" onclick="selectRole('candidate')">
          <div class="role-icon">&#127919;</div>
          <div class="role-name">Candidate</div>
          <div class="role-desc">Find your next role</div>
        </div>
        <div class="role-option" data-role="recruiter" onclick="selectRole('recruiter')">
          <div class="role-icon">&#128188;</div>
          <div class="role-name">Recruiter</div>
          <div class="role-desc">Hire top talent</div>
        </div>
      </div>

      <!-- Register Form -->
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="John Smith" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="8+ characters" required minlength="8" autocomplete="new-password">
        </div>

        <!-- Company Name (recruiter only) -->
        <div class="form-group" id="companyGroup" style="display:none;">
          <label class="form-label" for="companyName">Company Name</label>
          <input type="text" id="companyName" class="form-input" placeholder="Acme Inc.">
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/js/core.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      Auth.check().then(ok => {
        if (ok) window.location.href = Auth.isRecruiter() ? '/recruiter-dashboard.html' : '/candidate-dashboard.html';
      });
    }

    let selectedRole = 'candidate';

    // Check URL params for pre-selected role
    const urlParams = new URLSearchParams(window.location.search);
    const roleParam = urlParams.get('role');
    if (roleParam === 'recruiter') selectRole('recruiter');

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-option').forEach(el => {
        el.classList.toggle('active', el.dataset.role === role);
      });
      document.getElementById('companyGroup').style.display = role === 'recruiter' ? 'block' : 'none';
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const companyName = document.getElementById('companyName')?.value.trim();

      if (password.length < 8) {
        showError('Password must be at least 8 characters');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Creating account...';
      hideError();

      try {
        const fields = { name, email, password, role: selectedRole };
        if (selectedRole === 'recruiter' && companyName) fields.company_name = companyName;

        const data = await Auth.register(fields);
        if (data.success) {
          window.location.href = selectedRole === 'recruiter' ? '/recruiter-dashboard.html' : '/candidate-dashboard.html';
        } else {
          showError(data.error || 'Registration failed');
          resetBtn();
        }
      } catch (err) {
        showError(err.message || 'Registration failed. Please try again.');
        resetBtn();
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    function resetBtn() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  </script>
  <script defer src="https://polsia.com/analytics.js" data-slug="hireloop"></script>
</body>
</html>
