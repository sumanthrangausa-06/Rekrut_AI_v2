<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment - HireLoop</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { background: var(--bg-primary); margin: 0; padding: 0; overflow: hidden; }

    .assessment-container { height: 100vh; display: flex; flex-direction: column; }

    .assessment-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--bg-secondary);
      border-radius: 3px;
      margin: 0 24px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-gradient);
      transition: width 0.3s ease;
    }

    .timer {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      color: var(--accent-primary);
    }

    .timer.warning { color: #fbbf24; }
    .timer.danger { color: #ef4444; }

    .assessment-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
      overflow-y: auto;
    }

    .question-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 48px;
      max-width: 800px;
      width: 100%;
    }

    .question-number {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .question-text {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 32px;
      line-height: 1.4;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .option-button {
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      text-align: left;
      font-size: 16px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option-button:hover {
      border-color: var(--accent-primary);
      background: var(--bg-elevated);
    }

    .option-button.selected {
      border-color: var(--accent-primary);
      background: rgba(16, 185, 129, 0.1);
    }

    .textarea-answer {
      width: 100%;
      min-height: 200px;
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      margin-bottom: 24px;
      box-sizing: border-box;
    }

    .textarea-answer:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .feedback-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .feedback-modal.show { display: flex; }

    .feedback-content {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .feedback-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .feedback-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .feedback-text {
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .proctoring-warning {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      margin-bottom: 0;
      display: none;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: #fbbf24;
    }

    .proctoring-warning.show { display: flex; }

    .skill-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 600;
    }

    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="assessment-container">
    <!-- Header -->
    <div class="assessment-header">
      <div style="display: flex; align-items: center; gap: 16px;">
        <span class="skill-badge" id="skill-badge">Loading...</span>
        <span style="font-family: var(--font-display); font-weight: 600; font-size: 16px;">Question <span id="question-num">1</span> of <span id="total-questions">10</span></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 10%"></div>
      </div>
      <div class="timer" id="timer">2:00</div>
    </div>

    <!-- Proctoring Warning -->
    <div class="proctoring-warning" id="proctoring-warning">
      <span>⚠️</span>
      <span>Please stay in this tab. Tab switches are being monitored.</span>
    </div>

    <!-- Question Content -->
    <div class="assessment-content">
      <div class="question-card" id="question-card">
        <div class="loading-screen" id="loading-screen">
          <div class="loading-spinner"></div>
          <div style="font-family: var(--font-display); font-size: 20px; font-weight: 600;">Preparing Your Assessment</div>
          <div style="color: var(--text-muted);">AI is generating personalized questions...</div>
        </div>
        <div id="question-content" style="display: none;">
          <div class="question-number" id="difficulty-indicator">Medium Difficulty</div>
          <div class="question-text" id="question-text">Loading...</div>

          <div id="answer-area">
            <!-- Multiple choice options or textarea will be inserted here -->
          </div>

          <button class="btn btn-primary" id="submit-btn" style="width: 100%;" onclick="submitAnswer()">
            Submit Answer
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Feedback Modal -->
  <div class="feedback-modal" id="feedback-modal">
    <div class="feedback-content">
      <div class="feedback-icon" id="feedback-icon">✅</div>
      <div class="feedback-title" id="feedback-title">Correct!</div>
      <div class="feedback-text" id="feedback-text"></div>
      <button class="btn btn-primary" id="continue-btn" onclick="nextQuestion()">Continue</button>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    let sessionId = null;
    let currentQuestion = null;
    let selectedAnswer = null;
    let questionStartTime = Date.now();
    let timerInterval = null;
    let timeRemaining = 120;
    let isCompleted = false;

    // Anti-cheat tracking
    let isTabActive = true;
    let tabSwitchCount = 0;
    let copyPasteCount = 0;

    // Initialize assessment
    async function initAssessment() {
      await checkAuth();

      // Get skill info - support both new (name) and legacy (id) formats
      const skillName = localStorage.getItem('assessment_skill_name');
      const skillCategory = localStorage.getItem('assessment_skill_category');
      const skillId = localStorage.getItem('assessment_skill_id');

      if (!skillName && !skillId) {
        alert('No assessment selected');
        window.location.href = '/skill-assessments.html';
        return;
      }

      // Show skill name in header
      document.getElementById('skill-badge').textContent = skillName || 'Assessment';

      try {
        const body = skillName
          ? { skillName, category: skillCategory || 'technical' }
          : { skillId: parseInt(skillId) };

        const response = await fetch('/api/assessments/start', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('rekrutai_token')}`
          },
          body: JSON.stringify(body)
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || 'Failed to start assessment');
        }

        const data = await response.json();
        sessionId = data.sessionId;
        currentQuestion = data.question;

        if (data.skillName) {
          document.getElementById('skill-badge').textContent = data.skillName;
        }

        // Hide loading, show question
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('question-content').style.display = 'block';

        displayQuestion();
        startTimer(currentQuestion.timeLimit || 120);

        // Clean up localStorage
        localStorage.removeItem('assessment_skill_name');
        localStorage.removeItem('assessment_skill_category');
        localStorage.removeItem('assessment_skill_id');

      } catch (error) {
        console.error('Error starting assessment:', error);
        document.getElementById('loading-screen').innerHTML = `
          <div style="font-size: 64px; margin-bottom: 16px;">❌</div>
          <div style="font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text-primary);">Failed to Start Assessment</div>
          <div style="color: var(--text-muted); margin-bottom: 24px;">${error.message}</div>
          <a href="/skill-assessments.html" class="btn btn-primary">Back to Assessments</a>
        `;
      }
    }

    // Display current question
    function displayQuestion() {
      if (!currentQuestion) return;

      document.getElementById('question-num').textContent = currentQuestion.questionNumber;
      document.getElementById('total-questions').textContent = currentQuestion.totalQuestions;
      document.getElementById('question-text').textContent = currentQuestion.text;

      // Update progress bar
      const progress = (currentQuestion.questionNumber / currentQuestion.totalQuestions) * 100;
      document.getElementById('progress-fill').style.width = `${progress}%`;

      // Update difficulty indicator
      const diffMap = { 1: 'Easy', 2: 'Medium', 3: 'Challenging', 4: 'Hard', 5: 'Expert' };
      document.getElementById('difficulty-indicator').textContent =
        `${currentQuestion.type === 'short_answer' ? '✍️ Written Response' : '📝 Multiple Choice'}`;

      // Render answer area based on question type
      const answerArea = document.getElementById('answer-area');

      if (currentQuestion.type === 'multiple_choice' && currentQuestion.options) {
        const options = Array.isArray(currentQuestion.options) ? currentQuestion.options : [];
        answerArea.innerHTML = `
          <div class="options-grid">
            ${options.map((option, index) => `
              <button class="option-button" data-value="${option.replace(/"/g, '&quot;')}" onclick="selectOption(this)">
                ${option}
              </button>
            `).join('')}
          </div>
        `;
      } else if (currentQuestion.type === 'short_answer') {
        answerArea.innerHTML = `
          <textarea class="textarea-answer" id="short-answer" placeholder="Type your detailed answer here..."
                    onpaste="logCopyPaste(event)"></textarea>
        `;
      }

      // Reset state
      selectedAnswer = null;
      questionStartTime = Date.now();
    }

    // Select multiple choice option
    function selectOption(button) {
      document.querySelectorAll('.option-button').forEach(btn => {
        btn.classList.remove('selected');
      });
      button.classList.add('selected');
      selectedAnswer = button.dataset.value;
    }

    // Submit answer
    async function submitAnswer() {
      if (isCompleted) return;

      // Get answer
      if (currentQuestion.type === 'multiple_choice') {
        if (!selectedAnswer) {
          alert('Please select an answer');
          return;
        }
      } else {
        const textarea = document.getElementById('short-answer');
        if (textarea) {
          selectedAnswer = textarea.value.trim();
        }
        if (!selectedAnswer) {
          alert('Please provide an answer');
          return;
        }
      }

      // Calculate time taken
      const timeTaken = Math.floor((Date.now() - questionStartTime) / 1000);

      // Stop timer
      clearInterval(timerInterval);

      // Disable submit button
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Evaluating...';

      // Submit to API
      try {
        const response = await fetch('/api/assessments/answer', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('rekrutai_token')}`
          },
          body: JSON.stringify({
            sessionId,
            questionId: currentQuestion.id,
            answer: selectedAnswer,
            timeTaken
          })
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || 'Failed to submit answer');
        }

        const data = await response.json();

        // Show feedback
        showFeedback(data);

        // Store next question if not completed
        if (!data.completed) {
          currentQuestion = data.nextQuestion;
        } else {
          isCompleted = true;
          // Change continue button text
          document.getElementById('continue-btn').textContent = 'View Results';
          document.getElementById('continue-btn').onclick = () => {
            window.location.href = `/assessment-results.html?session=${sessionId}`;
          };
        }
      } catch (error) {
        console.error('Error submitting answer:', error);
        alert('Failed to submit answer: ' + error.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Answer';
      }
    }

    // Show feedback modal
    function showFeedback(data) {
      const modal = document.getElementById('feedback-modal');
      const icon = document.getElementById('feedback-icon');
      const title = document.getElementById('feedback-title');
      const text = document.getElementById('feedback-text');

      const isCorrect = data.feedback === 'Correct!';
      icon.textContent = isCorrect ? '✅' : '❌';
      title.textContent = data.feedback;
      title.style.color = isCorrect ? 'var(--accent-primary)' : '#ef4444';

      let feedbackHTML = '';
      if (data.explanation) {
        feedbackHTML += `<p style="margin-bottom: 12px;">${data.explanation}</p>`;
      }
      if (data.aiFeedback) {
        feedbackHTML += `<p style="padding-top: 12px; border-top: 1px solid var(--border-color); font-style: italic;">${data.aiFeedback}</p>`;
      }
      if (data.completed) {
        feedbackHTML += `<p style="margin-top: 16px; font-weight: 600; color: var(--accent-primary);">Assessment Complete! Final Score: ${data.score}</p>`;
      }
      text.innerHTML = feedbackHTML || 'Moving to next question...';

      modal.classList.add('show');
    }

    // Next question
    function nextQuestion() {
      if (isCompleted) {
        window.location.href = `/assessment-results.html?session=${sessionId}`;
        return;
      }

      document.getElementById('feedback-modal').classList.remove('show');

      // Re-enable submit button
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit Answer';

      displayQuestion();
      timeRemaining = currentQuestion.timeLimit || 120;
      startTimer(currentQuestion.timeLimit || 120);
    }

    // Timer
    function startTimer(seconds) {
      timeRemaining = seconds;
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timeRemaining--;
        updateTimerDisplay();

        if (timeRemaining <= 0) {
          clearInterval(timerInterval);
          submitAnswer();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const minutes = Math.floor(timeRemaining / 60);
      const seconds = timeRemaining % 60;
      const display = `${minutes}:${seconds.toString().padStart(2, '0')}`;

      const timerEl = document.getElementById('timer');
      timerEl.textContent = display;

      timerEl.className = 'timer';
      if (timeRemaining <= 10) {
        timerEl.classList.add('danger');
      } else if (timeRemaining <= 30) {
        timerEl.classList.add('warning');
      }
    }

    // Anti-cheat: Tab visibility
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && sessionId) {
        isTabActive = false;
        tabSwitchCount++;
        logEvent('tab_switch', { count: tabSwitchCount });

        const warning = document.getElementById('proctoring-warning');
        warning.classList.add('show');
        setTimeout(() => warning.classList.remove('show'), 3000);
      } else {
        isTabActive = true;
      }
    });

    // Anti-cheat: Copy/paste detection
    function logCopyPaste(event) {
      copyPasteCount++;
      logEvent('copy_paste', { count: copyPasteCount });
    }

    // Log anti-cheat event
    async function logEvent(eventType, eventData) {
      if (!sessionId) return;
      try {
        await fetch('/api/assessments/event', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('rekrutai_token')}`
          },
          body: JSON.stringify({ sessionId, eventType, eventData })
        });
      } catch (error) {
        console.error('Failed to log event:', error);
      }
    }

    // Prevent right-click (basic anti-cheat)
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Initialize on load
    document.addEventListener('DOMContentLoaded', initAssessment);
  </script>
</body>
</html>
